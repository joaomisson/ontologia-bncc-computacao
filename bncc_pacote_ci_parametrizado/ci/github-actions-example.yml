name: bncc-ontology-ci

on:
  push:
  pull_request:

jobs:
  validate-ontology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ci/requirements.txt

      - name: Run SHACL CI validation
        run: |
          chmod +x ci/run_shacl_ci.sh
          ci/run_shacl_ci.sh ontologia_bncc_computacao_inicial.ttl bncc_computacao_shapes_ci.ttl
